apiVersion: unleash.nais.io/v1
kind: ApiToken
metadata:
  name: loggkamel
  namespace: sikkerhetstjenesten
  labels:
    team: sikkerhetstjenesten
spec:
  unleashInstance:
    apiVersion: unleash.nais.io/v1
    kind: RemoteUnleash
