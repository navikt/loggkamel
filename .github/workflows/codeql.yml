name: CodeQL

on:
  schedule:
    - cron: '32 13 * * 1'

jobs:
  analyze-java:
    name: Analyze Java
    runs-on: ubuntu-latest-8-cores
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          # https://github.com/actions/setup-java/blob/main/README.md#Supported-distributions
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
      # Initializes the CodeQL tools for scanning.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@9e0d7b8d25671d64c341c19c0152d693099fb5ba
        with:
          languages: 'java'

      - name: Build Java
        run: ./mvnw clean install -P github-actions -DskipTests=true --threads=2 --batch-mode --settings ./.mvn/settings.xml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@9e0d7b8d25671d64c341c19c0152d693099fb5ba
        with:
          category: "/language:java"
