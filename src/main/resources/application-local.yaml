no.nav.security.jwt:
  issuer:
    azuread:
      discoveryurl: http://localhost:8080/default/.well-known/openid-configuration
      accepted_audience: client id
  client:
    registration:
      entra-proxy:
        token-endpoint-url: ${AZURE_OPENID_CONFIG_TOKEN_ENDPOINT}
        grant-type: client_credentials
        scope: ${ENTRA_PROXY_SCOPE}
        authentication:
          client-id: ${AZURE_APP_CLIENT_ID}
          client-jwk: ${AZURE_APP_JWK}
          client-auth-method: private_key_jwt
      onbehalfof:
        token-endpoint-url: https://login.microsoftonline.com/${AZURE_APP_TENANT_ID}/oauth2/v2.0/token
        grant-type: urn:ietf:params:oauth:grant-type:jwt-bearer
        scope: https://graph.microsoft.com/.default
        authentication:
          client-id:  client id
          client-jwk: ${azure.app.client.jwk}
          client-auth-method: private_key_jwt

entra-proxy:
  scope: "api://${nais.cluster.type}-gcp.sikkerhetstjenesten.entra-proxy/.default"
