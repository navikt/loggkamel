no.nav.security.jwt:
  issuer:
    issuer1:
      discoveryurl: http://localhost:${mock-oauth2-server.port}/issuerId/.well-known/openid-configuration
      accepted_audience: someaudience
  client:
    registration:
      entra-proxy:
        token-endpoint-url: http://example.com
        grant-type: client_credentials
        scope: some-scope
        authentication:
          client-id: testclient
          client-secret: testsecret
          client-auth-method: client_secret_basic

spring:
  cache:
    type: caffeine
  datasource:
    url: ${LOCAL_DB_JDBC_URL:jdbc:postgresql://localhost:5432/loggkamel}
    username: ${LOCAL_DB_USERNAME:${USER}}
    password: ${LOCAL_DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 5000
      max-lifetime: 1200000
      idle-timeout: 600000
      connection-test-query: SELECT 1
      maximum-pool-size: 5
  flyway:
    enabled: false

management:
  endpoint:
    env:
      show-values: always
    configprops:
      show-values: always
    health:
      show-details: always
      show-components: always
  endpoints:
    web:
      base-path: /monitoring
      exposure:
        include: '*'
  httpexchanges:
    recording:
      enabled: true

routing:
  postgres:
    consumer: "file:src/main/resources/files/postgres"
    invalid-message: "file:src/main/resources/files/postgres/invalid-messages"
    invalid-message-routing: ${routing.postgres.invalid-message}
  loggline:
    bucket: "file:src/main/resources/files/intermediate"
    invalid-message: "file:src/main/resources/files/intermediate/invalid-messages"
    invalid-message-routing: ${routing.loggline.invalid-message}
  arkiv:
    producer: "file:src/main/resources/files/output"

entra-proxy:
  scope: "api://${nais.cluster.type}-gcp.sikkerhetstjenesten.entra-proxy/.default"
