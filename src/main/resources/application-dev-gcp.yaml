
spring:
  mvc:
    log-request-details: true
management:
  endpoint:
    env:
      show-values: always
    configprops:
      show-values: always
    health:
      show-details: always
      show-components: always
  endpoints:
    web:
      exposure:
        include: '*'
  httpexchanges:
    recording:
      enabled: true

routing:
  postgres:
    consumer: "google-storage://loggkamel-ingress-pg-dev"
    producer: "google-storage://loggkamel-output-pg-dev"
    dead-letter: "google-storage://loggkamel-pg-dead-letter-dev"
    invalid-message: "google-storage://loggkamel-invalid-message-pg-dev"

debug: false